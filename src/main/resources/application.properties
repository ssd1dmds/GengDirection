server.port=8080

# Load untracked local overrides from project root if present.
spring.config.import=optional:file:./application-local.properties

# SQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/geng_direction?useSSL=false&serverTimezone=UTC&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.nailong.gengdirection.mapper=debug
