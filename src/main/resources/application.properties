
server.port=8080

# SQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/geng_direction?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=YourOwnPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.example.gengdirection.mapper=debug